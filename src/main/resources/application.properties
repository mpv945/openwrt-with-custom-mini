quarkus.rest-client.remote-api.scope=jakarta.inject.Singleton
quarkus.rest-client.remote-api.connect-timeout=5000
quarkus.rest-client.remote-api.read-timeout=10000
quarkus.rest-client.remote-api.connection-pool-size=50
quarkus.rest-client.remote-api.max-redirects=5
# \u542F\u7528 HTTP/2
quarkus.rest-client.remote-api.http2=true
quarkus.rest-client.remote-api.alpn=true
#\u65B9\u5F0F 1\uFF1A\u4F7F\u7528 truststore
#quarkus.tls.trust-all=true
#quarkus.rest-client.remote-api.trust-store=classpath:truststore.jks
#quarkus.rest-client.remote-api.trust-store-password=changeit
# \u5FFD\u7565\u8BC1\u4E66
quarkus.tls.tls-disabled.trust-all=true
quarkus.tls.tls-disabled.hostname-verification-algorithm=NONE
quarkus.rest-client.remote-api.tls-configuration-name=tls-disabled
# \u538B\u7F29\u652F\u6301
