name: Java CI with Maven native

# 限制 同一时间只允许一个 workflow 运行。
# 【push #1 → workflow A (运行中)然后push #2 → workflow B (触发)，workflow A ❌ 被取消，workflow B ✅ 接管执行】
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # necessary for windows
    shell: bash

on:
  push:
    branches: [ "main" ]
  #pull_request:
  #  branches: [ "main1" ]
  # 开启手动触发 ： https://icpc.cloud/2024/01/23/GitHub-Actions-%E6%89%8B%E5%8A%A8%E8%A7%A6%E5%8F%91%E6%96%B9%E5%BC%8F/
  workflow_dispatch:

jobs:
  build:

    # win-arm :https://github.com/actions/partner-runner-images [windows-11-arm]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
#    - name: Set up JDK 17
#      uses: actions/setup-java@v4
#      with:
#        java-version: '17'
#        distribution: 'temurin'
#        cache: maven
#    - name: Build with Maven
#      run: mvn -B package --file pom.xml
    - name: Setup GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        version: '25.0.2' # Old 'version' option for the GraalVM version # 查看：https://github.com/graalvm/graalvm-ce-builds/releases
        distribution: 'graalvm' # 默认graalvm；可选 graalvm-community，mandrel，liberica
        components: 'native-image'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # 生成完全静态 Linux binary，可在 Alpine / scratch 运行
        native-image-musl: 'true' # 支持 静态编译：https://github.com/graalvm/setup-graalvm/blob/778131f1d6837ccd4b2e91382c31830896a2d56e/.github/workflows/test.yml#L74-L92
        native-image-job-reports: 'false'
        set-java-home: 'true'
        cache: 'maven' # 默认'', 可选'maven', 'gradle', or 'sbt'
        # continue-on-error: true # 允许某些组合失败
    - name: Fix permissions
      run: |
        chmod +x mvnw
        chmod +x .mvn/wrapper/maven-wrapper.jar || true
        sudo ln -s /usr/bin/musl-gcc /usr/local/bin/x86_64-linux-musl-gcc
    - name: Example step using Maven plugin  # https://graalvm.github.io/native-build-tools/latest/maven-plugin.html
      env:
        CUSTOM_ENV: "test"
      run: |
        # ./mvnw package -Dnative
        ./mvnw clean package \
          -Dnative \
          -Dquarkus.native.container-build=true \
          -Dquarkus.native.additional-build-args="--static,--libc=musl,-H:+StripDebugInfo,-H:Optimize=2"
    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    #- name: Update dependency graph
    #  uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
